[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "relocation-model=static",
    "-C", "no-redzone=yes",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=-zmax-page-size=0x1000",
    "-C", "link-arg=-z", "-C", "link-arg=separate-code"
]